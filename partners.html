<style>

  .brand .mark{width:24px;height:24px;border-radius:7px;

  .langs button[aria-current=true]{background:#fff;color:var(--navy);box-shadow:var(--shadow-sm)}

  main{padding:44px 0 30px}

  .v{background:var(--card);border:1px solid var(--line);border-radius:var(--r);

  .note{font-size:12px;color:var(--muted);border-top:1px solid var(--line);

function pick(){

  if(u&&G[u])return u;
  try{const s=localStorage.getItem("lang");if(s&&G[s])return s;}catch(e){}
  const n=(navigator.language||"el").slice(0,2);return G[n]?n:"el";
}
let L=pick();

function apply(){
  const t=G[L];
  document.documentElement.lang=L;document.documentElement.dir=t.dir;
  try{localStorage.setItem("lang",L);}catch(e){}
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set("backLink",t.back);set("hTitle",t.hTitle);set("hSub",t.hSub);
  set("howTitle",t.howTitle);set("fTitle",t.fTitle);set("fLead",t.fLead);
  set("lRole",t.lRole);set("lName",t.lName);set("lFirm",t.lFirm);set("lEmail",t.lEmail);
  set("lPhone",t.lPhone);set("lAreas",t.lAreas);set("lMsg",t.lMsg);set("send",t.send);
  set("privacy",t.privacy);set("note",t.note);set("foot",t.foot);
  document.getElementById("backLink").href="index.html?lang="+L;
  document.getElementById("areas").placeholder=t.areasPh;
  document.getElementById("valGrid").innerHTML=t.vals.map(v=>
    `<div class="v"><div class="ic">${v[0]}</div><h3>${v[1]}</h3><p>${v[2]}</p></div>`).join("");
  set("priceTitle",t.priceTitle);set("priceSub",t.priceSub);set("pcBadge",t.pcBadge);
  set("pcAmount",t.pcAmount);set("pcDesc",t.pcDesc);
  document.getElementById("pcList").innerHTML=t.pcList.map(s=>`<li>${s}</li>`).join("");
  document.getElementById("howList").innerHTML=t.how.map(s=>`<li>${s}</li>`).join("");
  document.getElementById("role").innerHTML=t.roles.map(r=>`<option>${r}</option>`).join("");
  for(const b of document.querySelectorAll(".langs button"))
    b.setAttribute("aria-current",b.dataset.lang===L);
}
document.getElementById("langs").addEventListener("click",e=>{
  const b=e.target.closest("button");if(b){L=b.dataset.lang;apply();}
});

document.getElementById("send").addEventListener("click",async()=>{
  const t=G[L],msg=document.getElementById("formMsg");
  const email=document.getElementById("email").value.trim();
  if(!email){document.getElementById("email").focus();return;}
  if(!PARTNER_ENDPOINT){
    msg.style.color="var(--warn)";msg.textContent=t.soon;return;
  }
  try{
    const res=await fetch(PARTNER_ENDPOINT,{method:"POST",
      headers:{"Content-Type":"application/json","Accept":"application/json"},
      body:JSON.stringify({
        role:document.getElementById("role").value,
        name:document.getElementById("pname").value.trim(),
        firm:document.getElementById("firm").value.trim(),
        email,phone:document.getElementById("phone").value.trim(),
        areas:document.getElementById("areas").value.trim(),
        message:document.getElementById("pmsg").value.trim(),
        lang:L})});
    if(!res.ok)throw new Error(res.status);
    msg.style.color="var(--emerald)";msg.textContent=t.ok;
    for(const id of["pname","firm","email","phone","areas","pmsg"])
      document.getElementById(id).value="";
  }catch(e){msg.style.color="#B91C1C";msg.textContent=t.err;}
});

apply();
</script>
</body>
</html>
