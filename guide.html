 en:{dir:"ltr",back:"← All auctions",
  title:"How to take part in a Cyprus property auction",

  stepsH:"The 6 steps",checkH:"Before you bid — essential checklist",checkLead:"Experienced investors never skip these steps:",checklist:[["Title of ownership","Check at the Land Registry that the title is clean and that the WHOLE property is sold, not a share (e.g. 1/2)."],["Encumbrances & debts","Request a check for mortgages, memos, municipal fees and common expenses that may transfer to you."],["Occupancy status","Establish whether the property is occupied or rented — eviction can take time and money."],["Access & zoning","Confirm legal access (road) and planning zone, especially for plots and fields."],["Real cost","Calculate transfer fees, stamp duty, VAT, legal and renovation — use the “Total cost” button."],["Bid limit","Set your maximum in advance and don\u0027t exceed it in the heat of the moment."]],wonH:"I won the auction — what now?",wonLead:"The steps after winning, so you know what to expect:",wonlist:[["Pay the balance","You pay the remaining price within the deadline set by the auction. Delay may mean losing your deposit."],["Title transfer","Transfer happens at the Land Registry. You\u0027ll need a lawyer for the documents and transfer fees."],["Take possession","If the property is empty, you take it over. If occupied, legal eviction may be needed — which is why checking occupancy beforehand is critical."],["Loose ends","Settle any transferred debts (municipal, common expenses) and confirm the title is now clean in your name."]],expertH:"Feeling unsure? Ask an expert",expertText:"You don\u0027t have to do it all alone. On any property, tap \u0027I\u0027m interested\u0027 and choose what you need — legal check, valuation, financing or bidding help. We connect you with experienced local professionals, no obligation.",cta:"See current auctions",faqH:"Frequently asked questions",
  note:"This information is general and may have changed; it is not legal advice. Always verify each auction's terms at the official source and consult a lawyer before acting.",
  steps:[
   ["Find the property","Use the filters and AI score in our list. Watch the ⚠ flags — shares, missing data, multiple relistings."],

   ["Register on the platform","Participation is electronic via eauction-cy.com with identity verification (CY-LOGIN). Do it early — not in the final week."],
   ["Pay the deposit on time","The amount and deadline are set in each auction's terms. Miss the deadline and you're out — use the 📅 button in our list for a reminder."],
   ["Bid on auction day","Set your maximum in advance (the “Total cost” tool shows what you'll really pay) and don't exceed it."],
   ["After winning","Pay the price within the terms' timeframe, then transfer follows. Delays can mean losing your deposit."]],
  faq:[
   ["Is buying at auction legal?","Yes. Electronic auctions of mortgaged property are conducted under Cyprus law via the official platform eauction-cy.com."],
   ["Can I view the interior?","In most cases no — and that is the key risk of the process. An exterior visit and a Land Registry check are the realistic maximum."],
   ["What is the reserve price?","The minimum below which the property is not sold. It is set relative to the assessed market value and usually drops at repeat auctions."],
   ["How much is the participation deposit?","It is defined in each auction's terms — always read them. It is refunded if you don't win."],
   ["Can I participate from abroad?","Yes, the process is electronic. Registration and identity checks are required and may take longer for non-residents."],
   ["Could the property be occupied?","Possibly. Occupancy status is one of the most important points of legal due diligence before bidding."],

function pick(){
  const u=new URLSearchParams(location.search).get("lang");
  if(u&&G[u])return u;
  try{const s=localStorage.getItem("lang");if(s&&G[s])return s;}catch(e){}
  const n=(navigator.language||"el").slice(0,2);return G[n]?n:"el";
}
let L=pick();
function apply(){
  const t=G[L];
  document.documentElement.lang=L;document.documentElement.dir=t.dir;
  try{localStorage.setItem("lang",L);}catch(e){}
  for(const id of["back","title","sub","stepsH","checkH","checkLead","wonH","wonLead","expertH","expertText","faqH","cta","note"])
    document.getElementById(id).textContent=t[id];
  document.getElementById("back").href="index.html?lang="+L;
  document.getElementById("cta").href="index.html?lang="+L;
  document.getElementById("steps").innerHTML=t.steps.map((s,i)=>
    `<div class="step"><b class="n">${i+1}</b><div><h3>${s[0]}</h3><p>${s[1]}</p></div></div>`).join("");
  document.getElementById("checklist").innerHTML=t.checklist.map(c=>
    `<div class="chk-item"><div class="box">✓</div><div><h3>${c[0]}</h3><p>${c[1]}</p></div></div>`).join("");
  document.getElementById("wonlist").innerHTML=t.wonlist.map((c,i)=>
    `<div class="chk-item won-item"><div class="box">${i+1}</div><div><h3>${c[0]}</h3><p>${c[1]}</p></div></div>`).join("");
  document.getElementById("faq").innerHTML=t.faq.map(f=>
    `<details><summary>${f[0]}</summary><p>${f[1]}</p></details>`).join("");
  for(const b of document.querySelectorAll(".langs button"))
    b.setAttribute("aria-current",b.dataset.lang===L);
}
document.getElementById("langs").addEventListener("click",e=>{
  const b=e.target.closest("button");if(b){L=b.dataset.lang;apply();}
});
apply();
</script>
