<style>
  :root{
    --navy:#081C2E; --navy2:#0F2942; --blue:#2563EB; --blue-soft:#EEF3FF;
    --emerald:#00B67A; --emerald-soft:#E4F7F0; --gold:#D4AF37;
    --bg:#F5F7FA; --card:#FFFFFF; --ink:#111827;
    --muted:#6B7280; --line:#E8ECF1; --warn:#F59E0B; --danger:#EF4444;
    --success:#00B67A;
    --serif:'Manrope','Inter',system-ui,sans-serif;
    --display:'Manrope','Inter',system-ui,sans-serif;
    --sans:'Inter','Noto Sans Hebrew',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --shadow-sm:0 1px 2px rgba(8,28,46,.04),0 1px 3px rgba(8,28,46,.05);
    --shadow-md:0 4px 12px -2px rgba(8,28,46,.06),0 12px 28px -6px rgba(8,28,46,.10);
    --shadow-lg:0 24px 60px -16px rgba(8,28,46,.28);
    --shadow-xl:0 32px 80px -20px rgba(8,28,46,.35);
    --glass:rgba(255,255,255,.72);
    --r:22px; --r-sm:14px; --r-lg:28px;
    --ease:cubic-bezier(.2,.8,.2,1);
  }
  html[data-theme=dark]{
    --navy:#0A1B2A; --navy2:#0F2942; --bg:#050608; --card:#111827;
    --ink:#F3F4F6; --muted:#9AA6B4; --line:#1E2A3A; --blue-soft:#13233F;
    --emerald-soft:#0D2A22; --glass:rgba(17,24,39,.72);
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow-md:0 4px 12px -2px rgba(0,0,0,.4),0 12px 28px -6px rgba(0,0,0,.5);
    --shadow-lg:0 24px 60px -16px rgba(0,0,0,.6);
    --shadow-xl:0 32px 80px -20px rgba(0,0,0,.7);
    --glass:rgba(17,24,39,.72);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{background:var(--bg)!important;color:var(--ink)!important;font-family:var(--sans);
    font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}
  a{color:inherit}

  /* ---------- NAV ---------- */
  .nav{position:sticky;top:0;z-index:30;background:var(--glass);
    backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--line)}
  .nav .row{display:flex;align-items:center;gap:18px;height:68px}
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--display);font-weight:800;
    font-size:18px;letter-spacing:-.03em;color:var(--navy);text-decoration:none;white-space:nowrap}
  .brand .mark{width:32px;height:32px;border-radius:10px;
    background:linear-gradient(135deg,var(--navy),var(--blue));display:grid;
    place-items:center;color:#fff;font-size:15px;font-weight:800;
    box-shadow:0 4px 12px -2px rgba(37,99,235,.4);position:relative;overflow:hidden}
  .brand .mark::after{content:"";position:absolute;inset:0;
    background:linear-gradient(135deg,transparent 40%,rgba(212,175,55,.35) 100%)}
  .nav .spacer{flex:1}
  .nav a.link{font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;
    white-space:nowrap;transition:color .2s var(--ease)}
  .nav a.link:hover{color:var(--navy)}
  @media(max-width:760px){.nav a.link{display:none}}
  .langs{display:flex;gap:2px;background:var(--blue-soft);border-radius:99px;padding:3px}
  .langs button{font:inherit;font-size:12px;font-weight:700;cursor:pointer;background:none;
    border:none;border-radius:99px;padding:5px 10px;color:var(--muted);transition:all .2s var(--ease)}
  .langs button[aria-current=true]{background:var(--card);color:var(--navy);box-shadow:var(--shadow-sm)}
  .theme-btn{width:34px;height:34px;border-radius:99px;border:1px solid var(--line);
    background:var(--card);cursor:pointer;display:grid;place-items:center;font-size:15px;
    transition:all .2s var(--ease);color:var(--muted)}
  .theme-btn:hover{color:var(--navy);transform:translateY(-1px);box-shadow:var(--shadow-sm)}

  /* ---------- HERO ---------- */
  .hero{position:relative;overflow:hidden;
    background:linear-gradient(150deg,#050E18 0%,#081C2E 40%,#0F2942 78%,#12355A 100%)}
  .hero::before{content:"";position:absolute;inset:0;
    background:
      radial-gradient(820px 420px at 78% -12%,rgba(37,99,235,.55),transparent 62%),
      radial-gradient(640px 380px at 6% 112%,rgba(0,182,122,.36),transparent 58%),
      radial-gradient(480px 300px at 92% 90%,rgba(212,175,55,.14),transparent 60%);
    animation:heroGlow 14s ease-in-out infinite alternate}
  @keyframes heroGlow{0%{opacity:.75;transform:scale(1)}100%{opacity:1;transform:scale(1.06)}}
  .hero::after{content:"";position:absolute;inset:0;opacity:.1;
    background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);
    background-size:52px 52px;mask-image:linear-gradient(180deg,#000,transparent 80%)}
  .hero .wrap{position:relative;z-index:1;padding:96px 24px 140px;text-align:center}
  .hero .eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:12.5px;
    font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#CFE0F7;
    background:rgba(255,255,255,.06);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.14);border-radius:99px;padding:8px 16px;margin-bottom:28px;
    animation:fadeUp .7s var(--ease) both}
  .hero .eyebrow .pulse{width:7px;height:7px;border-radius:99px;background:var(--emerald);
    box-shadow:0 0 0 0 rgba(0,182,122,.6);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,182,122,.55)}
    70%{box-shadow:0 0 0 10px rgba(0,182,122,0)}100%{box-shadow:0 0 0 0 rgba(0,182,122,0)}}
  .hero h1{font-family:var(--display);font-size:clamp(38px,6vw,68px);font-weight:800;
    line-height:1.02;letter-spacing:-.04em;color:#fff;max-width:15ch;margin:0 auto;
    animation:fadeUp .8s var(--ease) .05s both}
  .hero h1 .grad{background:linear-gradient(120deg,#fff 30%,#8FC5FF 70%,#D4AF37 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero .sub{color:#C4D6EC;font-size:clamp(16px,2vw,20px);margin:24px auto 0;
    max-width:54ch;line-height:1.55;animation:fadeUp .8s var(--ease) .12s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  /* search bar — Airbnb style */
  .searchbar{position:relative;z-index:2;max-width:880px;margin:-64px auto 0;
    background:var(--card);border-radius:99px;box-shadow:var(--shadow-xl);
    padding:10px 10px 10px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    border:1px solid var(--line);animation:fadeUp .8s var(--ease) .2s both}
  @media(max-width:600px){.searchbar{border-radius:var(--r);padding:12px}}
  .searchbar .field{flex:1;min-width:200px;display:flex;align-items:center;gap:12px;padding:8px 12px}
  .searchbar svg{width:20px;height:20px;color:var(--muted);flex-shrink:0}
  .searchbar input{border:none;outline:none;font:inherit;font-size:16px;width:100%;
    background:none;color:var(--ink)}
  .searchbar .go{background:linear-gradient(135deg,var(--blue),#1E4FD8);color:#fff;border:none;
    border-radius:99px;font:inherit;font-weight:700;font-size:15px;padding:15px 30px;cursor:pointer;
    transition:transform .18s var(--ease),box-shadow .2s;white-space:nowrap;
    box-shadow:0 8px 20px -6px rgba(37,99,235,.5)}
  .searchbar .go:hover{transform:translateY(-2px);box-shadow:0 14px 30px -8px rgba(37,99,235,.6)}
  .alert-cta{display:inline-flex;align-items:center;gap:8px;margin:22px auto 0;
    font:inherit;font-size:14.5px;font-weight:700;cursor:pointer;
    background:linear-gradient(135deg,var(--emerald),#00A06C);color:#fff;border:none;
    border-radius:99px;padding:13px 26px;box-shadow:0 8px 22px -5px rgba(0,182,122,.5);
    transition:transform .18s var(--ease),box-shadow .2s;position:relative;z-index:1}
  .alert-cta:hover{transform:translateY(-2px);box-shadow:0 14px 32px -6px rgba(0,182,122,.6)}
  .alert-wrap{text-align:center}
  .subscribe{margin:20px 0 8px;background:linear-gradient(135deg,#081C2E,#12355A);
    border-radius:var(--r-lg);padding:44px 32px;text-align:center;position:relative;overflow:hidden;
    box-shadow:var(--shadow-lg)}
  .subscribe::after{content:"";position:absolute;inset:0;opacity:.1;
    background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);background-size:40px 40px;
    mask-image:linear-gradient(180deg,#000,transparent 90%)}
  .subscribe .s-in{position:relative;z-index:1;max-width:540px;margin:0 auto}
  .subscribe .s-ic{width:60px;height:60px;border-radius:18px;background:rgba(0,182,122,.18);
    border:1px solid rgba(0,182,122,.3);display:grid;place-items:center;margin:0 auto 18px;font-size:28px}
  .subscribe h2{font-family:var(--display);color:#fff;font-size:clamp(22px,3vw,30px);font-weight:800;
    letter-spacing:-.03em;margin-bottom:10px}
  .subscribe p{color:#C4D6EC;font-size:15px;margin-bottom:24px;line-height:1.55}
  .subscribe .s-btn{font:inherit;font-size:15.5px;font-weight:700;cursor:pointer;
    background:linear-gradient(135deg,var(--emerald),#00A06C);color:#fff;border:none;border-radius:14px;
    padding:15px 32px;box-shadow:0 10px 26px -6px rgba(0,182,122,.6);transition:transform .18s var(--ease)}
  .subscribe .s-btn:hover{transform:translateY(-2px)}

  /* animated stats — floating luxury cards */
  .hero-stats{position:relative;z-index:1;display:flex;justify-content:center;
    gap:16px;flex-wrap:wrap;margin-top:36px;animation:fadeUp .9s var(--ease) .3s both}
  .hero-stats .s{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:18px 26px;min-width:150px;
    box-shadow:0 12px 34px -12px rgba(0,0,0,.4);transition:transform .3s var(--ease)}
  .hero-stats .s:hover{transform:translateY(-4px)}
  .hero-stats .s b{display:block;font-family:var(--display);font-size:30px;font-weight:800;color:#fff;
    letter-spacing:-.03em;font-variant-numeric:tabular-nums}
  .hero-stats .s span{font-size:12.5px;color:#B8CCE4;font-weight:500}

  /* ---------- FILTER BAR ---------- */
  .toolbar{position:sticky;top:62px;z-index:20;background:rgba(248,250,252,.9);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 0}
  .toolbar .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .toolbar select,.toolbar input{font:inherit;font-size:14px;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:10px 13px;box-shadow:var(--shadow-sm);transition:border-color .15s}
  .toolbar input[type=search]{flex:1;min-width:170px}
  .toolbar input[type=number]{width:140px}
  .toolbar select:focus,.toolbar input:focus{outline:none;border-color:var(--blue);
    box-shadow:0 0 0 3px var(--blue-soft)}
  .chk{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--ink);
    white-space:nowrap;cursor:pointer;background:var(--card);border:1px solid var(--line);
    border-radius:11px;padding:10px 13px;box-shadow:var(--shadow-sm)}
  .chk input{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
  .clearbtn{font:inherit;font-size:13px;font-weight:600;cursor:pointer;background:none;
    border:none;color:var(--muted);margin-inline-start:auto;padding:6px 4px}
  .clearbtn:hover{color:var(--danger)}
  .card .when.urg{color:var(--danger);font-weight:700}
  .card .when.urg .dot{background:var(--danger);animation:pulse 1.8s infinite}
  .count{font-size:13px;color:var(--muted);white-space:nowrap;
    font-weight:500}

  /* views toggle */
  .views{display:flex;gap:8px;padding:22px 0 6px}
  .views button{font:inherit;font-size:14px;font-weight:600;cursor:pointer;
    background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:9px 17px;color:var(--muted);box-shadow:var(--shadow-sm);transition:all .15s}
  .views button:hover{color:var(--navy)}
  .views button[aria-current=true]{background:var(--navy);color:#fff;border-color:var(--navy)}

  /* ---------- GRID + CARDS ---------- */
  main{padding-bottom:60px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
    gap:24px;padding-top:8px}
  .dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;
    margin:8px 0 22px}
  .dash-card{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:18px 20px;box-shadow:var(--shadow-sm);transition:transform .3s var(--ease),box-shadow .3s;
    animation:fadeUp .6s var(--ease) both}
  .dash-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
  .dash-card .dc-lbl{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
    color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:10px}
  .dash-card .dc-ic{font-size:14px}
  .dash-card .dc-val{font-family:var(--display);font-size:26px;font-weight:800;letter-spacing:-.03em;
    color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
  .dash-card .dc-sub{font-size:12px;color:var(--muted);margin-top:5px}
  .dash-card .dc-val.pos{color:var(--emerald)}
  .temp-bar{height:6px;border-radius:99px;background:var(--line);margin-top:12px;overflow:hidden}
  .temp-fill{height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--blue),var(--emerald));transition:width 1s var(--ease)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);
    box-shadow:var(--shadow-sm);text-decoration:none;color:inherit;overflow:hidden;
    display:flex;flex-direction:column;transition:transform .35s var(--ease),box-shadow .35s var(--ease),border-color .3s;
    position:relative}
  .card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:transparent}
  .card .banner{height:180px;position:relative;overflow:hidden;
    background:linear-gradient(120deg,#EAF2FE,#E4F7F0)}
  .card .banner-img{position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;filter:saturate(1.08);transition:transform .6s var(--ease)}
  .card:hover .banner-img{transform:scale(1.06)}
  .card .banner::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(8,28,46,0) 35%,rgba(8,28,46,.6) 100%)}
  .card .banner .type{position:absolute;inset-inline-start:18px;bottom:14px;z-index:2;
    font-family:var(--display);font-size:17px;font-weight:800;color:#fff;letter-spacing:-.02em;
    text-shadow:0 2px 8px rgba(0,0,0,.45)}
  .banner.no-img .type{color:var(--navy);text-shadow:none}
  .banner.no-img::after{display:none}
  .card .banner .disc{position:absolute;inset-inline-end:14px;top:14px;z-index:2;
    background:linear-gradient(135deg,var(--emerald),#00A06C);color:#fff;font-size:12.5px;font-weight:800;
    border-radius:10px;padding:6px 11px;letter-spacing:.01em;box-shadow:0 6px 16px -3px rgba(0,182,122,.5)}
  .card .banner .initials{position:absolute;font-family:var(--display);font-size:82px;font-weight:800;
    color:rgba(8,28,46,.06);inset-inline-end:16px;top:-16px;letter-spacing:-.04em;display:none}
  .banner.no-img .initials{display:block}
  .card .body{padding:20px 20px 20px;display:flex;flex-direction:column;gap:11px;flex:1}
  .card .loc{font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .card .price-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .card .price{font-family:var(--display);font-size:29px;font-weight:800;letter-spacing:-.035em;color:var(--ink);
    font-variant-numeric:tabular-nums;line-height:1}
  .card .per{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .card .meta{font-family:var(--mono);font-size:11.5px;color:var(--muted);
    display:flex;gap:12px;flex-wrap:wrap}
  .card .when{font-size:12.5px;color:var(--navy);font-weight:600;display:flex;
    align-items:center;gap:6px}
  .card .when .dot{width:6px;height:6px;border-radius:99px;background:var(--emerald)}

  .badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .badge{font-size:11px;font-weight:700;border-radius:8px;padding:4px 9px;letter-spacing:.01em}
  .badge.new{background:var(--blue-soft);color:var(--blue)}
  .badge.drop{background:var(--emerald-soft);color:var(--emerald)}
  .badge.again{background:var(--line);color:var(--muted)}
  .badge.cat{background:var(--blue-soft);color:var(--navy)}
  .badge.opp{background:linear-gradient(135deg,#F0B429,#E8890C);color:#fff;
    box-shadow:0 3px 10px -2px rgba(232,137,12,.45)}
  .badge.vacant{background:#E0F2FE;color:#0369A1}
  .badge.yield{background:var(--emerald-soft);color:var(--emerald)}
  .conf{font-size:11px;color:var(--muted);margin-inline-start:auto;display:flex;
    align-items:center;gap:4px}
  .conf .d{width:6px;height:6px;border-radius:99px}
  .conf.high .d{background:var(--success)}.conf.medium .d{background:var(--warn)}
  .conf.low .d{background:#CBD2DA}
  .badge.ai{color:#fff}
  .badge.ai.deal{background:var(--emerald)}
  .badge.ai.fair{background:var(--blue)}
  .badge.ai.caution{background:var(--warn)}
  /* Apple-ring style AI score */
  .score{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,var(--bg),var(--card));
    border:1px solid var(--line);border-radius:16px;padding:13px 15px}
  .score .ring{--v:0;width:52px;height:52px;border-radius:99px;flex-shrink:0;
    background:conic-gradient(var(--sc,var(--blue)) calc(var(--v)*3.6deg),var(--line) 0);
    display:grid;place-items:center;position:relative;
    box-shadow:0 4px 14px -4px var(--sc,var(--blue));animation:ringIn .9s var(--ease) both}
  @keyframes ringIn{from{--v:0;opacity:.4}to{opacity:1}}
  .score .ring i{width:40px;height:40px;border-radius:99px;background:var(--card);
    display:grid;place-items:center;font-style:normal;font-family:var(--display);

function pickLang(){
  const url = new URLSearchParams(location.search).get("lang");
  if (url && I18N[url]) return url;
  try{
    const saved = localStorage.getItem("lang");
    if (saved && I18N[saved]) return saved;
  }catch(e){}
  const nav = (navigator.language || "el").slice(0,2);
  return I18N[nav] ? nav : "el";
}
let LANG = pickLang();
let T = I18N[LANG];

function applyLang(){
  T = I18N[LANG];
  document.documentElement.lang = LANG;
  document.documentElement.dir = T.dir;
  try{ localStorage.setItem("lang", LANG); }catch(e){}
  for (const el of document.querySelectorAll("[data-t]"))
    el.textContent = T[el.dataset.t];

const fmtEUR = n => n == null ? "—" : "€" + Math.round(n).toLocaleString(T.locale);
const fmtDate = iso => {
  if (!iso) return "—";
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
};
const daysAgo = iso => (Date.now() - new Date(iso)) / 86400000;
function urgentDays(iso){
  if(!iso) return false;
  const d = Math.ceil((new Date(iso) - Date.now())/86400000);
  return d >= 0 && d <= 3;
}
function countdown(iso){
  if(!iso) return "";
  const d = Math.ceil((new Date(iso) - Date.now())/86400000);
  if(d < 0) return T.cdPast;
  if(d === 0) return T.cdToday;
  if(d === 1) return T.cdTomorrow;
  return fmtDate(iso) + " · " + T.cdDays.replace("{n}", d);
}
let FAVS = new Set();
try { FAVS = new Set(JSON.parse(localStorage.getItem("favs")||"[]")); } catch(e){}
function toggleFav(code){
  if(FAVS.has(code)) FAVS.delete(code); else FAVS.add(code);
  try { localStorage.setItem("favs", JSON.stringify([...FAVS])); } catch(e){}
}
function fmtCompact(v){
  if (v >= 1e9) return "€" + (v/1e9).toFixed(1).replace(/\.0$/,"") + "B";
  if (v >= 1e6) return "€" + (v/1e6).toFixed(1).replace(/\.0$/,"") + "M";
  if (v >= 1e3) return "€" + Math.round(v/1e3) + "K";
  return "€" + v;
}
function animateStats(){
  for(const el of document.querySelectorAll("[data-count]")){
    const target = +el.dataset.count, isMoney = el.dataset.money === "1",
          dur = 1000, t0 = performance.now();
    (function step(t){
      const p = Math.min(1,(t-t0)/dur), v = Math.round(target*(1-Math.pow(1-p,3)));
      el.textContent = isMoney ? fmtCompact(v) : v.toLocaleString(T.locale);
      if(p<1) requestAnimationFrame(step);
    })(t0);
  }
}

let DATA = [];
let loadError = false;
let VIEW = "all";

async function load(){
  try{
    const res = await fetch("data/auctions.json", {cache:"no-store"});
    if(!res.ok) throw new Error(res.status);
    const j = await res.json();
    DATA = j.auctions || [];
    window.UPDATED = j.updated;
  }catch(e){
    loadError = true;
  }
  applyLang();
}

function rebuildSelects(){
  const keepD = fDistrict.value, keepT = fType.value;
  const uniq = k => [...new Set(DATA.map(r => r[k]).filter(Boolean))].sort();
  fDistrict.innerHTML = `<option value="">${T.allDistricts}</option>` +
    uniq("district").map(d =>
      `<option value="${d}">${trValue(DISTRICTS, d)}</option>`).join("");
  fType.innerHTML = `<option value="">${T.allTypes}</option>` +
    uniq("type").map(t =>
      `<option value="${t}">${trValue(TYPES, t)}</option>`).join("");
  fDistrict.value = keepD; fType.value = keepT;
}

function isFullOwnership(r){
  // Θεωρούμε "μερίδιο" όταν το AI το σημειώνει ή όταν το κείμενο δείχνει κλάσμα < 1/1
  const flags = (r.ai?.flags || []).join(" ");
  if (/μερίδ|share|доля|חלק/i.test(flags)) return false;
  const t = (r.description || "") + " " + (r.reg_no || "");
  const m = t.match(/Μερίδιο\s*:?\s*(\d+)\s*\/\s*(\d+)/i);
  if (m && m[1] !== m[2]) return false;
  return true;
}
function methodLabel(m){return {comparable:T.mComparable,income:T.mIncome,mixed:T.mMixed,insufficient:T.mInsufficient}[m]||"";}
function catLabel(c){return {flip:T.catFlip,buy_to_let:T.catLet,land:T.catLand,commercial:T.catCom}[c]||"";}
function confLabel(c){return {high:T.confH,medium:T.confM,low:T.confL}[c]||"";}
function dropPct(r){
  if(r.initial_price && r.price && r.price < r.initial_price)
    return Math.round((1 - r.price / r.initial_price) * 100);
  return 0;
}

function renderDash(){
  const dash = document.getElementById("dash");
  if (!dash || !DATA.length) { if(dash) dash.innerHTML=""; return; }
  // Πραγματικά analytics από τα δεδομένα
  const addedToday = DATA.filter(r => r.first_seen && daysAgo(r.first_seen) === 0).length;
  const discs = DATA.map(r => dropPct(r)).filter(x => x > 0);
  const avgDisc = discs.length ? Math.round(discs.reduce((a,b)=>a+b,0)/discs.length) : 0;
  const maxDisc = discs.length ? Math.max(...discs) : 0;
  // Πιο ενεργή επαρχία
  const byD = {};
  DATA.forEach(r => { if(r.district) byD[r.district] = (byD[r.district]||0)+1; });
  const topD = Object.entries(byD).sort((a,b)=>b[1]-a[1])[0];
  // Θερμοκρασία αγοράς: % ακινήτων με AI score 65+
  const hot = DATA.filter(r => r.ai?.score >= 65).length;
  const temp = DATA.length ? Math.round(hot/DATA.length*100) : 0;
  const cards = [
    {ic:"✦", lbl:T.dashAdded, val:addedToday, sub:T.dashAddedSub},
    {ic:"▾", lbl:T.dashAvgDisc, val:avgDisc?`${avgDisc}%`:"—", sub:T.dashAvgDiscSub, pos:avgDisc>0},
    {ic:"◆", lbl:T.dashMaxDisc, val:maxDisc?`−${maxDisc}%`:"—", sub:T.dashMaxDiscSub, pos:maxDisc>0},
    {ic:"◈", lbl:T.dashActive, val:topD?trValue(DISTRICTS,topD[0]):"—", sub:topD?`${topD[1]} ${T.upcoming.toLowerCase()}`:"", small:true},
  ];
  let html = cards.map((c,i) => `<div class="dash-card" style="animation-delay:${i*60}ms">
    <div class="dc-lbl"><span class="dc-ic">${c.ic}</span>${c.lbl}</div>
    <div class="dc-val ${c.pos?'pos':''}" style="${c.small?'font-size:19px':''}">${c.val}</div>
    ${c.sub?`<div class="dc-sub">${c.sub}</div>`:""}
  </div>`).join("");
  // Market temperature με μπάρα
  html += `<div class="dash-card" style="animation-delay:240ms">
    <div class="dc-lbl"><span class="dc-ic">◉</span>${T.dashTemp}</div>
    <div class="dc-val">${temp}%</div>
    <div class="temp-bar"><div class="temp-fill" style="width:${temp}%"></div></div>
  </div>`;
  dash.innerHTML = html;
}

function render(){
  const list = document.getElementById("list");

  if (loadError){
    list.innerHTML = `<div class="state"><h2>${T.errH}</h2><p>${T.errP}</p></div>`;
    document.getElementById("updated").textContent = "";
    return;
  }
  if (window.UPDATED)
    document.getElementById("updated").textContent = T.updated + ": " +
      new Date(window.UPDATED).toLocaleString(T.locale,
        {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});

  const q = fSearch.value.trim().toLowerCase();
  const max = parseFloat(fMax.value) || Infinity;
  const min = parseFloat(fMin.value) || 0;
  const maxM2 = parseFloat(fMaxM2.value) || Infinity;
  const minYield = parseFloat(fYield.value) || 0;
  const days = parseInt(fTime.value) || 0;
  const now = Date.now();
  let rows = DATA.filter(r =>
    (!fDistrict.value || r.district === fDistrict.value) &&
    (!fType.value || r.type === fType.value) &&
    ((r.price ?? 0) <= max) && ((r.price ?? 0) >= min) &&
    (maxM2 === Infinity || (r.sqm && r.price && (r.price / r.sqm) <= maxM2)) &&
    (!fCat.value || (r.ai && r.ai.category === fCat.value)) &&
    (minYield === 0 || (r.ai && r.ai.yield_est && r.ai.yield_est >= minYield)) &&
    (!days || (r.auction_date && (new Date(r.auction_date) - now) <= days*86400000 && (new Date(r.auction_date) - now) >= -86400000)) &&
    (!fDrop.checked || dropPct(r) > 0) &&
    (!fFull.checked || isFullOwnership(r)) &&
    (!q || [r.municipality, r.district, r.lender, r.code, r.type,
            r.description, r.reg_no,
            trValue(DISTRICTS, r.district), trValue(TYPES, r.type)]
      .join(" ").toLowerCase().includes(q))
  );

  const s = fSort.value || "date";
  rows.sort((a,b) =>
    s === "priceAsc"  ? (a.price ?? 1e12) - (b.price ?? 1e12) :
    s === "priceDesc" ? (b.price ?? 0) - (a.price ?? 0) :
    s === "drop"      ? dropPct(b) - dropPct(a) :
    s === "ai"        ? ((b.ai?.score ?? -1) - (a.ai?.score ?? -1)) :
    (a.auction_date || "9999") < (b.auction_date || "9999") ? -1 : 1
  );

  if (VIEW === "top") {
    rows = rows.filter(r => (r.ai?.score ?? 0) >= 70 || dropPct(r) >= 15)
               .sort((a,b) => (b.ai?.score ?? 0) - (a.ai?.score ?? 0));
  } else if (VIEW === "fav") {
    rows = rows.filter(r => FAVS.has(r.code));
  }
  count.textContent = `${rows.length} ${T.of} ${DATA.length}`;

  const week = DATA.filter(r => r.auction_date &&
    (new Date(r.auction_date) - Date.now()) < 7*86400000 &&
    (new Date(r.auction_date) - Date.now()) > -86400000).length;
  const drops = DATA.filter(r => dropPct(r) > 0).length;
  const totalVal = DATA.reduce((s,r) => s + (r.price || 0), 0);
  stats.innerHTML = `
    <div class="s"><b data-count="${DATA.length}">0</b><span>${T.upcoming}</span></div>
    <div class="s"><b data-count="${Math.round(totalVal)}" data-money="1">0</b><span>${T.totalValue}</span></div>
    <div class="s"><b data-count="${week}">0</b><span>${T.next7}</span></div>
    <div class="s"><b data-count="${drops}">0</b><span>${T.reduced}</span></div>`;
  animateStats();
  renderDash();

  if(!rows.length){
    const msg = VIEW === "fav" ? T.noFav : T.emptyP;
    list.innerHTML = `<div class="state"><h2>${T.emptyH}</h2><p>${msg}</p></div>`;
    return;
  }

  list.innerHTML = rows.slice(0, 400).map(r => {
    const dp = dropPct(r);
    const isNew = r.first_seen && daysAgo(r.first_seen) <= 7;
    const loc = [r.municipality, trValue(DISTRICTS, r.district)].filter(Boolean).join(", ");
    const init = (trValue(TYPES, r.type) || "•").slice(0,2).toUpperCase();
    const scColor = r.ai ? (r.ai.verdict === "deal" ? "var(--emerald)" :
      r.ai.verdict === "caution" ? "var(--warn)" : "var(--blue)") : "var(--blue)";
    const cd = countdown(r.auction_date);
    const fav = FAVS.has(r.code);
    const geo = geoFor(r);
    const banner = geo
      ? `<img class="banner-img" loading="lazy" alt="${loc}"
           src="https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/14/${lat2tile(geo[0],14)}/${lon2tile(geo[1],14)}"
           onerror="this.style.display='none';this.parentNode.classList.add('no-img')">`
      : "";
    return `
    <a class="card" href="${r.url}" target="_blank" rel="noopener">
      <button class="fav" data-fav="${r.code}" aria-pressed="${fav}" title="${T.favTitle}">${fav ? "♥" : "♡"}</button>
      <div class="banner">
        ${banner}
        <span class="initials">${init}</span>
        <span class="type">${trValue(TYPES, r.type) || T.property}</span>
        ${dp ? `<span class="disc">−${dp}%</span>` : ""}
      </div>
      <div class="body">
        <div class="price-row">
          <span class="price">${fmtEUR(r.price)}</span>
          ${r.sqm && r.price ? `<span class="per">${fmtEUR(r.price / r.sqm)}/m²</span>` : ""}
        </div>
        <div class="loc">📍 ${loc}</div>
        <div class="meta">
          ${r.sqm ? `<span>${Math.round(r.sqm)} m²</span>` : ""}
          <span>${r.lender || ""}</span>
        </div>
        ${cd ? `<div class="when${urgentDays(r.auction_date) ? " urg" : ""}"><span class="dot"></span>${urgentDays(r.auction_date) ? T.urgent + " · " : ""}${cd}</div>` : ""}
        ${r.ai ? `<div class="score">
          <div class="ring" style="--v:${r.ai.score};--sc:${scColor}"><i>${r.ai.score}</i></div>
          <div class="lbl"><b>${T.aiScore} ${r.ai.score}/100</b>
            <span>${r.ai.verdict === "deal" ? T.aiDeal : r.ai.verdict === "caution" ? T.aiCaution : T.aiFair}</span></div>
          ${(r.ai.reasons && r.ai.reasons.length) ? `<button class="why-btn" data-code="${r.code}">${T.aiWhy}</button>` : ""}
        </div>
        ${r.ai.valuation && r.ai.valuation.market_value_est && r.ai.valuation.discount_pct > 0 ? `
        <div class="valbox">
          <span class="valbox-disc">−${r.ai.valuation.discount_pct}%</span>
          <span class="valbox-txt">${T.belowMarket} · ${T.estValue} ${fmtEUR(r.ai.valuation.market_value_est)}</span>
        </div>` : ""}` : ""}
        <div class="badges">

const GEO = {
  "ΛΕΥΚΩΣΙΑ":[35.1856,33.3823], "ΛΕΜΕΣΟΣ":[34.7071,33.0226],
  "ΛΑΡΝΑΚΑ":[34.9229,33.6233], "ΠΑΦΟΣ":[34.7720,32.4297],
  "ΑΜΜΟΧΩΣΤΟΣ":[35.0333,33.9333], "ΚΕΡΥΝΕΙΑ":[35.3417,33.3192]
};
// Μερικοί γνωστοί δήμοι για ακριβέστερο κέντρο όταν υπάρχουν στο municipality
const GEO_TOWN = [
  ["ΠΑΡΑΛΙΜΝ",[35.0381,33.9823]], ["ΑΓΙΑ ΝΑΠΑ",[34.9880,34.0000]],
  ["ΓΕΡΜΑΣΟΓΕΙΑ",[34.7180,33.0870]], ["ΑΡΑΔΙΠΠΟΥ",[34.9500,33.5833]],
  ["ΠΟΛΕΜ",[34.8830,32.5170]], ["ΣΤΡΟΒΟΛ",[35.1370,33.3400]],
  ["ΛΑΚΑΤΑΜ",[35.1000,33.3167]], ["ΠΟΛΗ",[35.0353,32.4267]]
];
function lon2tile(lon, z){ return Math.floor((lon+180)/360*Math.pow(2,z)); }
function lat2tile(lat, z){
  const r = lat*Math.PI/180;
  return Math.floor((1 - Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z));
}
function geoFor(r){
  const muni = (r.municipality || "").toUpperCase();
  for (const [k,c] of GEO_TOWN) if (muni.includes(k)) return c;
  return GEO[r.district] || null;
}
function openLocation(code){
  const r = DATA.find(x => x.code === code);
  if (!r) return;
  const c = geoFor(r);
  if (!c) return;
  const [lat,lon] = c, dl = 0.06;
  const bbox = [lon-dl, lat-dl*0.7, lon+dl, lat+dl*0.7].join("%2C");

  const osmFull = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=13/${lat}/${lon}`;

  const satLink = `https://www.google.com/maps/@${lat},${lon},600m/data=!3m1!1e3`;
  const isLand = r.type && /οικοπεδ|χωραφ|αγροτεμ|τεμαχ|γη|κτημα/i.test(

        <a class="send" href="${osmFull}" target="_blank" rel="noopener" style="text-decoration:none;text-align:center;flex:1;background:var(--card);color:var(--navy);border:1px solid var(--line)">${T.openMap}</a>

/* ==================== ΕΡΓΑΛΕΙΑ: ΚΟΣΤΟΣ & ΗΜΕΡΟΛΟΓΙΟ ==================== */
function transferFees(p){
  // Κλίμακα Κύπρου: 3% έως €85k, 5% €85-170k, 8% άνω των €170k, με 50% μείωση
  let f = 0;
  f += Math.min(p, 85000) * 0.03;
  if (p > 85000)  f += (Math.min(p, 170000) - 85000) * 0.05;
  if (p > 170000) f += (p - 170000) * 0.08;
  return f * 0.5;
}
function stampDuty(p){
  let s = Math.min(p, 170000) * 0.0015;
  if (p > 170000) s += (p - 170000) * 0.002;
  return Math.min(s, 20000);
}
function openCost(code){
  const r = DATA.find(x => x.code === code);
  if (!r || !r.price) return;
  const p = r.price, tf = transferFees(p), sd = stampDuty(p),
        lg = Math.max(p * 0.01, 800), total = p + tf + sd + lg;
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <h3>${T.costTitle}</h3>
      <div class="mcode">${code}</div>
      <table class="cost-table">
        <tr><td>${T.costPrice}</td><td>${fmtEUR(p)}</td></tr>
        <tr><td>${T.costTransfer}</td><td>${fmtEUR(tf)}</td></tr>
        <tr><td>${T.costStamp}</td><td>${fmtEUR(sd)}</td></tr>
        <tr><td>${T.costLegal}</td><td>${fmtEUR(lg)}</td></tr>
        <tr class="total"><td>${T.costTotal}</td><td>${fmtEUR(total)}</td></tr>
      </table>
      <div class="roi">
        <div class="roi-h">${T.roiTitle}</div>
        <label>${T.roiReno}</label>
        <input type="number" id="roiReno" min="0" step="1000" value="0">
        <label>${T.roiRent}</label>
        <input type="number" id="roiRent" min="0" step="50" value="${r.ai?.yield_est ? Math.round(p * r.ai.yield_est/100/12) : 0}">
        <label>${T.roiResale}</label>
        <input type="number" id="roiResale" min="0" step="1000" value="${r.ai?.valuation?.market_value_est || ""}">
        <div class="roi-out" id="roiOut"></div>
      </div>
      <div class="privacy">${T.costNote}</div>
      <div class="actions"><button class="close" id="mClose">✕</button></div>
    </div>`;
  document.body.appendChild(bg);
  const baseTotal = total;
  function calcRoi(){
    const reno = parseFloat(bg.querySelector("#roiReno").value) || 0;
    const rent = parseFloat(bg.querySelector("#roiRent").value) || 0;
    const resale = parseFloat(bg.querySelector("#roiResale").value) || 0;
    const invested = baseTotal + reno;
    const out = [];
    if (rent > 0){
      const yearly = rent * 12;
      const grossYield = (yearly / invested) * 100;
      out.push(`<div><b>${grossYield.toFixed(1)}%</b><span>${T.roiYield}</span></div>`);
      out.push(`<div><b>${fmtEUR(yearly)}</b><span>${T.roiAnnual}</span></div>`);
    }
    if (resale > 0){
      const profit = resale - invested;
      const roiPct = (profit / invested) * 100;
      out.push(`<div><b style="color:${profit>=0?'var(--emerald)':'#C0392B'}">${profit>=0?'+':''}${fmtEUR(profit)}</b><span>${T.roiProfit}</span></div>`);
      out.push(`<div><b style="color:${roiPct>=0?'var(--emerald)':'#C0392B'}">${roiPct>=0?'+':''}${roiPct.toFixed(0)}%</b><span>${T.roiReturn}</span></div>`);
    }
    bg.querySelector("#roiOut").innerHTML = out.length
      ? `<div class="roi-grid">${out.join("")}</div><div class="roi-inv">${T.roiInvested}: <b>${fmtEUR(invested)}</b></div>`
      : "";
  }
  bg.querySelectorAll("#roiReno,#roiRent,#roiResale").forEach(el =>
    el.addEventListener("input", calcRoi));
  calcRoi();
  bg.addEventListener("click", e => { if (e.target === bg) bg.remove(); });
  bg.querySelector("#mClose").onclick = () => bg.remove();
}
function icsDate(iso, offsetDays=0){
  const d = new Date(iso); d.setDate(d.getDate() + offsetDays);
  return d.toISOString().slice(0,10).replace(/-/g,"");
}
function downloadICS(code){
  const r = DATA.find(x => x.code === code);
  if (!r || !r.auction_date) return;
  const loc = [r.municipality, r.district].filter(Boolean).join(", ");
  const ics = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//CyprusAuctions//EL",
    "BEGIN:VEVENT",
    "UID:" + code + "-auction",
    "DTSTART;VALUE=DATE:" + icsDate(r.auction_date),
    "SUMMARY:" + T.calAuction + " " + code + " — " + loc,
    "DESCRIPTION:" + (r.url || ""),
    "BEGIN:VALARM","TRIGGER:-P1D","ACTION:DISPLAY","DESCRIPTION:" + T.calAuction,"END:VALARM",
    "END:VEVENT",
    "BEGIN:VEVENT",
    "UID:" + code + "-deposit",
    "DTSTART;VALUE=DATE:" + icsDate(r.auction_date, -5),
    "SUMMARY:⚠ " + T.calDeposit + " — " + code,
    "END:VEVENT",
    "END:VCALENDAR"].join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([ics], {type:"text/calendar"}));
  a.download = "auction-" + code + ".ics";
  a.click();
  URL.revokeObjectURL(a.href);
}

function priceHistoryChart(r){
  const h = r.history || [];
  if (h.length < 2) return "";
  const prices = h.map(s => s.p).filter(Boolean);
  if (prices.length < 2) return "";
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const W = 280, H = 70, pad = 6;
  const pts = h.filter(s=>s.p).map((s,i,arr) => {
    const x = pad + (i/(arr.length-1)) * (W - pad*2);
    const y = pad + (1 - (s.p - min)/range) * (H - pad*2);
    return [x,y];
  });
  const path = pts.map((p,i) => `${i?"L":"M"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  const area = path + ` L${pts[pts.length-1][0].toFixed(1)} ${H-pad} L${pts[0][0].toFixed(1)} ${H-pad} Z`;
  const first = prices[0], last = prices[prices.length-1];
  const dropPct = first > last ? Math.round((1-last/first)*100) : 0;
  return `<div class="ph-box">
    <div class="ph-h">${T.priceHist}${dropPct ? ` <span style="color:var(--emerald)">−${dropPct}%</span>` : ""}</div>
    <svg viewBox="0 0 ${W} ${H}" class="ph-svg">
      <path d="${area}" fill="url(#phg)" opacity="0.15"/>
      <path d="${path}" fill="none" stroke="var(--emerald)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="var(--emerald)"/>`).join("")}
      <defs><linearGradient id="phg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--emerald)"/><stop offset="1" stop-color="var(--emerald)" stop-opacity="0"/></linearGradient></defs>
    </svg>
    <div class="ph-ends"><span>${fmtEUR(first)}</span><span>${fmtEUR(last)}</span></div>
  </div>`;
}

function similarProperties(r){
  if (!r.district) return "";
  const cls = t => {
    const x = (t||"").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if (/ΔΙΑΜΕΡ|STUDIO|ΓΚΑΡΣ/.test(x)) return "a";
    if (/ΚΑΤΟΙΚ|ΟΙΚΙΑ|ΜΕΖΟΝ|ΒΙΛΑ/.test(x)) return "h";
    if (/ΟΙΚΟΠΕΔ|ΧΩΡΑΦ|ΑΓΡΟΤΕΜ|ΓΗ/.test(x)) return "l";
    if (/ΚΑΤΑΣΤ|ΓΡΑΦΕΙ|ΑΠΟΘΗΚ/.test(x)) return "c";
    return "o";
  };
  const myCls = cls(r.type);
  const sims = DATA.filter(x => x.code !== r.code && x.district === r.district
    && cls(x.type) === myCls && x.price)
    .sort((a,b) => Math.abs((a.price||0)-(r.price||0)) - Math.abs((b.price||0)-(r.price||0)))
    .slice(0,3);
  if (!sims.length) return "";
  return `<div class="sim-box">
    <div class="sim-h">${T.similar}</div>
    ${sims.map(s => `<div class="sim-item" data-code="${s.code}">
      <div class="sim-t">${trValue(TYPES, s.type) || T.property}</div>
      <div class="sim-meta">${s.municipality||s.district}${s.sqm?` · ${Math.round(s.sqm)}m²`:""}</div>
      <div class="sim-price">${fmtEUR(s.price)}${s.ai?.score?` · AI ${s.ai.score}`:""}</div>
    </div>`).join("")}
  </div>`;
}

const _sg = document.getElementById("searchGo"); if (_sg) _sg.addEventListener("click", () => render());
const _ao = document.getElementById("alertOpen"); if (_ao) _ao.addEventListener("click", openAlerts);
// Theme toggle (dark/light) με μνήμη
(function(){
  const btn = document.getElementById("themeBtn");
  const root = document.documentElement;
  let saved;
  try { saved = localStorage.getItem("theme"); } catch(e){}
  if (saved === "dark" || (!saved && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)){
    root.setAttribute("data-theme","dark");
  }
  const sync = () => { if(btn) btn.textContent = root.getAttribute("data-theme")==="dark" ? "☀" : "◐"; };
  sync();
  if (btn) btn.addEventListener("click", () => {
    const dark = root.getAttribute("data-theme")==="dark";
    if (dark) root.removeAttribute("data-theme"); else root.setAttribute("data-theme","dark");
    try { localStorage.setItem("theme", dark ? "light" : "dark"); } catch(e){}
    sync();
  });
})();
const _sb = document.getElementById("subBtn");
if (_sb) _sb.addEventListener("click", () => openAlerts());
const _ft = document.getElementById("filterToggle");
if (_ft) _ft.addEventListener("click", () => {

});
document.getElementById("clearF").addEventListener("click", () => {
  fDistrict.value = ""; fType.value = ""; fMax.value = ""; fMin.value = ""; fMaxM2.value = "";
  fCat.value = ""; fTime.value = ""; fYield.value = ""; fDrop.checked = false;

document.getElementById("list").addEventListener("click", e => {
  const fav = e.target.closest(".fav");
  if (fav){ e.preventDefault(); e.stopPropagation(); toggleFav(fav.dataset.fav);
    const on = FAVS.has(fav.dataset.fav);
    fav.setAttribute("aria-pressed", on); fav.textContent = on ? "♥" : "♡"; return; }
  const w = e.target.closest(".why-btn");
  if (w){ e.preventDefault(); e.stopPropagation(); openWhy(w.dataset.code); return; }
  const ph = e.target.closest(".photos-btn");
  if (ph){ e.preventDefault(); e.stopPropagation();
    window.open(ph.dataset.url, "_blank", "noopener"); return; }
  const b = e.target.closest(".lead-btn, .cost-btn, .cal-btn, .map-btn");
  if (!b) return;
  e.preventDefault(); e.stopPropagation();
  if (b.classList.contains("lead-btn")) openLead(b.dataset.code);
  else if (b.classList.contains("cost-btn")) openCost(b.dataset.code);
  else if (b.classList.contains("map-btn")) openLocation(b.dataset.code);
  else downloadICS(b.dataset.code);
});

/* ==================== ΧΑΡΤΗΣ (Leaflet — πραγματικός χάρτης) ==================== */
function scoreColor(avg){
  return avg >= 65 ? "#18B67A" : avg >= 50 ? "#2D7FF9" : "#9AA3A0";
}
let _map = null, _markers = [];
function districtTiles(){
  // Εναλλακτική προβολή (χωρίς εξωτερικό χάρτη): κομψά πλακίδια ανά επαρχία
  const byD = {};
  for (const r of DATA){
    const d = r.district; if (!d) continue;
    const g = byD[d] || (byD[d] = {n:0, s:0, sc:0});
    g.n++; if (r.ai?.score){ g.s += r.ai.score; g.sc++; }
  }
  const items = Object.entries(byD).sort((a,b) => b[1].n - a[1].n).map(([d,g]) => {
    const avg = g.sc ? Math.round(g.s / g.sc) : 0;
    return `<button class="dtile" data-d="${d}">
      <span class="dt-top">
        <span class="dt-dot" style="background:${scoreColor(avg)}"></span>
        <span class="dt-name">${trValue(DISTRICTS, d)}</span>
      </span>
      <span class="dt-bottom">
        <span><span class="dt-n">${g.n}</span> <span class="dt-nlbl">${T.upcoming}</span></span>
        ${avg ? `<span class="dt-ai">AI ${avg}</span>` : ""}
      </span>
    </button>`;
  }).join("");
  const wrap = document.getElementById("mapWrap");
  wrap.innerHTML = `<div class="cy-map"><div class="dtiles">${items}</div>
    <div class="cy-legend">
      <span><i style="background:#18B67A"></i>${T.topWeek} (AI 65+)</span>
      <span><i style="background:#2D7FF9"></i>AI 50-64</span>
      <span><i style="background:#9AA3A0"></i>AI &lt;50 / —</span>
    </div></div>`;
  wrap.querySelectorAll(".dtile").forEach(b =>
    b.addEventListener("click", () => {
      fDistrict.value = b.dataset.d; setView("all"); render();
      document.getElementById("list").scrollIntoView({ behavior: "smooth" });
    }));
}
function renderMap(){
  const wrap = document.getElementById("mapWrap");
  // Αν το Leaflet δεν είναι διαθέσιμο (π.χ. χωρίς ίντερνετ), δείξε πλακίδια
  if (typeof L === "undefined"){
    districtTiles();
    return;
  }
  if (!wrap.querySelector("#leaflet")){
    wrap.innerHTML = `<div class="cy-map">
      <div id="leaflet" style="height:440px;border-radius:14px;overflow:hidden"></div>
      <div class="cy-legend">
        <span><i style="background:#18B67A"></i>${T.topWeek} (AI 65+)</span>
        <span><i style="background:#2D7FF9"></i>AI 50-64</span>
        <span><i style="background:#9AA3A0"></i>AI &lt;50 / —</span>
      </div></div>`;
  }
  if (!_map){
    _map = L.map("leaflet", { scrollWheelZoom: false, attributionControl: true })
      .setView([34.95, 33.2], 8);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18, attribution: "© OpenStreetMap"
    }).addTo(_map);
  }
  // Καθάρισμα προηγούμενων σημείων
  _markers.forEach(m => _map.removeLayer(m));
  _markers = [];

  // Ομαδοποίηση ανά επαρχία: πλήθος + μέσο AI
  const byD = {};
  for (const r of DATA){
    const d = r.district; if (!GEO[d]) continue;
    const g = byD[d] || (byD[d] = {n:0, s:0, sc:0});
    g.n++; if (r.ai?.score){ g.s += r.ai.score; g.sc++; }
  }
  const maxN = Math.max(1, ...Object.values(byD).map(g => g.n));
  const bounds = [];
  for (const [d,g] of Object.entries(byD)){
    const [lat,lon] = GEO[d];
    const avg = g.sc ? Math.round(g.s / g.sc) : 0;
    const rad = 14 + 22 * Math.sqrt(g.n / maxN);
    const nm = trValue(DISTRICTS, d);
    const marker = L.circleMarker([lat,lon], {
      radius: rad, fillColor: scoreColor(avg), color: "#fff",
      weight: 2, fillOpacity: 0.85
    }).addTo(_map);
    marker.bindTooltip(`<b>${nm}</b>: ${g.n}${avg? " · AI "+avg:""}`,
      { direction: "top" });
    // Ετικέτα με τον αριθμό πάνω στο σημείο
    const label = L.marker([lat,lon], {
      icon: L.divIcon({
        className: "cy-count",
        html: `<span style="color:#fff;font-weight:700;font-size:13px;
          font-family:'IBM Plex Mono',monospace">${g.n}</span>`,
        iconSize: [30,30], iconAnchor: [15,15]
      }), interactive: false
    }).addTo(_map);
    marker.on("click", () => {
      fDistrict.value = d; setView("all"); render();
      document.getElementById("list").scrollIntoView({ behavior: "smooth" });
    });
    _markers.push(marker, label);
    bounds.push([lat,lon]);
  }
  if (bounds.length){
    _map.fitBounds(bounds, { padding: [50,50], maxZoom: 9 });
  }
  // Το Leaflet χρειάζεται invalidateSize όταν το container ήταν κρυμμένο
  setTimeout(() => _map && _map.invalidateSize(), 60);
}

/* ==================== VIEW TOGGLE ==================== */
function setView(v){
  VIEW = v;
  for (const b of document.querySelectorAll("#views button"))
    b.setAttribute("aria-current", b.dataset.view === v);
  const showMap = v === "map";
  document.getElementById("mapWrap").style.display = showMap ? "block" : "none";
  document.getElementById("list").style.display = showMap ? "none" : "block";
  if (showMap) renderMap();
}
document.getElementById("views").addEventListener("click", e => {
  const b = e.target.closest("button");
  if (b){ setView(b.dataset.view); if (b.dataset.view !== "map") render(); }
});

for(const el of [fDistrict, fType, fMax, fMin, fMaxM2, fCat, fTime, fYield, fSort, fSearch])
  el.addEventListener("input", render);
fFull.addEventListener("change", render);
fDrop.addEventListener("change", render);
load();
</script>
